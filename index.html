<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<!-- ═══════════════════════════════════════════════════════════════
     @esri/lerc — LERC / LERC+Zstd decompressor (loaded on demand)
     Only needed for COGs with TIFF compression tag 50000 or 50001.
     Tries ESRI's own CDN first (most reliable), then npm CDN fallbacks.
     Resolves window._lercReady with the library instance once ready.
     ═══════════════════════════════════════════════════════════════ -->
<script>
window._lercReady = new Promise((resolve, reject) => {
  // Try multiple CDNs and multiple versions.
  // v4 changed its UMD global name — we probe every known variant.
  const candidates = [
    // Self-hosted on S3 — tried first, avoids external CDN blocks
    'https://imagery.mutant.kiwi/LercDecode.js',
    // ESRI's own CDN (no version pin — always latest stable)
    'https://js.arcgis.com/lerc/lerc.min.js',
    // v4.x on jsdelivr
    'https://cdn.jsdelivr.net/npm/@esri/lerc@4.0.1/dist/browser/lerc.min.js',
    // v3.x on jsdelivr — different global name (LercDecode)
    'https://cdn.jsdelivr.net/npm/@esri/lerc@3.0.0/dist/LercDecode.min.js',
    // unpkg fallbacks
    'https://unpkg.com/@esri/lerc@4.0.1/dist/browser/lerc.min.js',
    'https://unpkg.com/@esri/lerc@3.0.0/dist/LercDecode.min.js',
    // lerc package (no @esri scope) — different package, same API
    'https://unpkg.com/lerc@3.0.0/LercDecode.js',
  ];
  let i = 0;

  // Probe every plausible global the library might set after loading
  function detectLib() {
    // v4 UMD global variants
    const candidates = [
      window.Lerc,
      window.LercDecode,
      window.lerc,
      // v4 may nest under esri namespace
      window.esri && window.esri.lerc,
      // Some builds export as module-style default
      window['@esri/lerc'],
    ].filter(Boolean);

    for (const lib of candidates) {
      // Need a decode() function — either directly or on a nested object
      if (typeof lib.decode === 'function') return lib;
      if (lib.default && typeof lib.default.decode === 'function') return lib.default;
    }
    return null;
  }

  function tryNext() {
    if (i >= candidates.length) {
      reject(new Error('All LERC CDNs failed — globals tried: Lerc, LercDecode, lerc, esri.lerc'));
      return;
    }
    const url = candidates[i++];
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => {
      const lib = detectLib();
      if (!lib) {
        // Loaded but no usable global found — log what IS on window for debugging
        const lercKeys = Object.keys(window).filter(k => /lerc/i.test(k));
        console.warn('[LERC] Script loaded but no decode() found. Window keys matching /lerc/:', lercKeys.join(', ') || 'none');
        tryNext();
        return;
      }
      window.Lerc = lib; // normalise to window.Lerc for readRastersLerc()
      // v4 requires an async load() call to initialise the WASM module
      (typeof lib.load === 'function' ? lib.load() : Promise.resolve())
        .then(() => resolve(lib))
        .catch(err => { console.warn('[LERC] load() failed:', err); tryNext(); });
    };
    s.onerror = () => { console.warn('[LERC] Failed to load:', url); tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
});
</script>
<!-- ═══════════════════════════════════════════════════════════════
     Zstd decompressor — for COGs with TIFF compression tag 50003.
     zstd-codec is tried first (matches geotiff.js 2.1.x internals),
     then fzstd (compatible with geotiff.js 2.2+).
     Resolves window._zstdReady with the decompressor instance.
     ═══════════════════════════════════════════════════════════════ -->
<script>
window._zstdReady = new Promise((resolve, reject) => {
  // Try zstd-codec first (matches geotiff.js 2.1.x internal check)
  // then fzstd (geotiff.js 2.2+), then reject
  const candidates = [
    { url: 'https://cdn.jsdelivr.net/npm/zstd-codec@0.1.5/dist/zstd-codec.min.js',
      check: () => window.ZstdCodec,
      init: () => new Promise(res => window.ZstdCodec.run(zstd => res(zstd))) },
    { url: 'https://unpkg.com/zstd-codec@0.1.5/dist/zstd-codec.min.js',
      check: () => window.ZstdCodec,
      init: () => new Promise(res => window.ZstdCodec.run(zstd => res(zstd))) },
    { url: 'https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js',
      check: () => window.fzstd && window.fzstd.decompress,
      init: () => Promise.resolve(window.fzstd) },
    { url: 'https://unpkg.com/fzstd@0.1.1/umd/index.js',
      check: () => window.fzstd && window.fzstd.decompress,
      init: () => Promise.resolve(window.fzstd) },
  ];
  let i = 0;
  function tryNext() {
    if (i >= candidates.length) { reject(new Error('All Zstd CDNs failed')); return; }
    const c = candidates[i++];
    const s = document.createElement('script');
    s.src = c.url;
    s.onload = () => {
      if (!c.check()) { tryNext(); return; }
      c.init().then(resolve).catch(tryNext);
    };
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
});
</script>

<script src="https://browser.sentry-cdn.com/7.99.0/bundle.min.js" crossorigin="anonymous"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c0f;
    --surface:  #111419;
    --surface2: #181c23;
    --border:   rgba(255,255,255,0.07);
    --accent:   #e8ff47;
    --accent2:  #47c8ff;
    --text:     #e2e8f0;
    --muted:    #6b7280;
    --danger:   #ff6b47;
    --panel-w:  420px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

  #map { position: fixed; inset: 0; cursor: crosshair; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: linear-gradient(180deg, rgba(10,12,15,0.97) 0%, rgba(10,12,15,0) 100%);
    pointer-events: none;
  }
  #header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  #header .sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

  #coords-bar {
    position: fixed; bottom: 24px; left: 24px; z-index: 10;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
    background: rgba(10,12,15,0.85); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 4px; backdrop-filter: blur(8px); transition: color 0.2s;
  }
  #coords-bar.active { color: var(--accent2); }

  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 20;
    width: var(--panel-w); background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); will-change: transform;
    min-width: 280px; max-width: 800px;
  }
  #panel.open { transform: translateX(0); }
  #panel.resizing { transition: none; user-select: none; }

  #panel-resize-handle {
    position: absolute; left: -4px; top: 0; bottom: 0; width: 8px;
    cursor: ew-resize; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  #panel-resize-handle::after {
    content: '';
    display: block;
    width: 3px; height: 40px;
    background: var(--border);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #panel-resize-handle:hover::after,
  #panel.resizing #panel-resize-handle::after { opacity: 1; background: var(--accent2); }



  #panel-header {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  #panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  #panel-coords { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  #panel-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; color: var(--text);
  }
  #panel-count .n { color: var(--accent); font-weight: 700; }

  #close-btn {
    width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0; margin-left: 8px;
  }
  #close-btn:hover { background: var(--border); color: var(--text); }

  #progress-wrap { flex-shrink: 0; height: 3px; background: var(--surface2); }
  #progress-bar { height: 100%; width: 0; background: var(--accent); transition: width 0.2s; }

  #results { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; display: block; }
  #results .result-card { margin-bottom: 8px; }
  #results::-webkit-scrollbar { width: 4px; }
  #results::-webkit-scrollbar-track { background: transparent; }
  #results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .state-msg {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; gap: 12px; color: var(--muted); text-align: center; padding: 40px;
  }
  .state-msg svg { opacity: 0.25; }
  .state-msg p { font-size: 13px; line-height: 1.6; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; transition: border-color 0.2s;
  }
  .result-card:hover { border-color: rgba(255,255,255,0.15); }
  .result-card.footprint-active { border-color: var(--accent2) !important; }
  .result-card.expanded { border-color: var(--accent2); }

  .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .card-index {
    width: 22px; height: 22px; border-radius: 3px; background: var(--accent);
    color: #0a0c0f; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-layer { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-feat { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-chevron { color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .result-card.expanded .card-chevron { transform: rotate(180deg); }

  .card-body { display: none; padding: 0 14px 14px; }
  .result-card.expanded .card-body { display: block; }

  .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .meta-table tr { border-bottom: 1px solid var(--border); }
  .meta-table tr:last-child { border-bottom: none; }
  .meta-table td { padding: 5px 0; font-size: 11px; vertical-align: top; }
  .meta-table td:first-child { color: var(--muted); font-family: 'JetBrains Mono', monospace; width: 38%; padding-right: 8px; }

  .cog-error { font-size: 10px; color: var(--danger); font-family: 'JetBrains Mono', monospace; padding: 16px; text-align: center; }    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    margin-bottom: 12px; position: relative; background: var(--bg);
    min-height: 120px; display: flex; align-items: center; justify-content: center;
  }
  .cog-error { font-size: 10px; color: var(--danger); font-family: 'JetBrains Mono', monospace; padding: 16px; text-align: center; }

  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
    font-family: 'Syne', sans-serif; letter-spacing: 0.03em; border: none;
  }
  .btn-primary { background: var(--accent); color: #0a0c0f; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-secondary:hover { background: rgba(71,200,255,0.1); }
  .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  .click-marker { width: 14px; height: 14px; position: relative; }
  .click-marker::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: var(--accent); animation: pulse-ring 1.5s ease-out infinite;
  }
  .click-marker::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--accent); }
  @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

  #instructions {
    position: fixed; bottom: 64px; left: 24px; z-index: 10;
    background: rgba(10,12,15,0.85); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 5px; backdrop-filter: blur(8px);
    font-size: 11px; color: var(--muted); line-height: 1.7;
    pointer-events: none; transition: opacity 0.4s;
  }
  #instructions.hidden { opacity: 0; }
  #instructions span { color: var(--text); }

  #config-btn {
    position: fixed; top: 16px; right: 24px; z-index: 15;
    width: 36px; height: 36px; border-radius: 5px;
    background: rgba(10,12,15,0.85); border: 1px solid var(--border);
    cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); transition: all 0.15s;
  }
  #config-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  /* COG map overlay controls */
  #cog-overlay-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 900; background: rgba(8,10,13,0.97);
    border: 1px solid rgba(71,200,255,0.25); border-radius: 8px;
    backdrop-filter: blur(12px);
    display: none; flex-direction: column;
    font-family: 'JetBrains Mono', monospace;
    width: 540px; max-width: calc(100vw - 32px);
    max-height: 220px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.6);
  }
  #cog-overlay-bar.visible { display: flex; }
  #cog-bar-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 10px; flex-shrink: 0;
  }
  #cog-bar-header-title { color: var(--accent2); font-weight: 700; letter-spacing: .08em; flex: 1; }
  #cog-bar-count { color: var(--muted); }
  #cog-overlay-close, #cog-bar-dl-all {
    background: transparent; border: none; cursor: pointer;
    font: 10px 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px;
    transition: color 0.15s;
  }
  #cog-overlay-close { color: var(--muted); }
  #cog-overlay-close:hover { color: #ff6b47; }
  #cog-bar-dl-all { color: var(--accent2); }
  #cog-bar-dl-all:hover { color: #fff; }
  #cog-bar-dl-all:disabled { color: var(--muted); cursor: default; }
  #cog-bar-loading {
    padding: 7px 12px; color: var(--accent2); font-size: 10px;
    display: none; align-items: center; gap: 8px;
  }
  .cog-bar-spinner {
    width: 11px; height: 11px; border: 2px solid rgba(71,200,255,0.25);
    border-top-color: var(--accent2); border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  #cog-bar-list { overflow-y: auto; }
  #cog-bar-list::-webkit-scrollbar { width: 3px; }
  #cog-bar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
  .cog-bar-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 11px;
  }
  .cog-bar-row:last-child { border-bottom: none; }
  .cog-bar-row-label {
    flex: 1; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .cog-bar-row-asset { color: var(--accent); font-size: 10px; flex-shrink: 0; }
  .cog-bar-row-status { flex-shrink: 0; width: 14px; display: flex; align-items: center; justify-content: center; }
  .cog-bar-row-status .row-spinner {
    width: 10px; height: 10px; border: 1.5px solid rgba(71,200,255,0.2);
    border-top-color: var(--accent2); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .cog-bar-row-status .row-tick { color: #3ecf6a; font-size: 12px; line-height: 1; }
  .cog-bar-row-status .row-err  { color: #ff6b47; font-size: 12px; line-height: 1; }
  .cog-bar-row-remove {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    font-size: 11px; padding: 2px 5px; border-radius: 3px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .cog-bar-row-remove:hover { color: #ff6b47; }
  .cog-bar-row-dl {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    font-size: 11px; padding: 2px 5px; border-radius: 3px; flex-shrink: 0;
    text-decoration: none; transition: color 0.15s;
  }
  .cog-bar-row-dl:hover { color: var(--accent2); }

  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* ── Geocoder search bar ── */
  #geocoder {
    position: fixed; top: 64px; left: 24px; z-index: 15;
    width: 340px;
  }
  #geocoder-input-wrap {
    display: flex; align-items: center; gap: 10px;
    background: rgba(10,12,15,0.92); border: 1px solid var(--border);
    border-radius: 5px; backdrop-filter: blur(10px);
    padding: 0 12px; transition: border-color 0.2s;
  }
  #geocoder-input-wrap:focus-within {
    border-color: var(--accent2);
  }
  #geocoder-icon {
    color: var(--muted); flex-shrink: 0; pointer-events: none;
  }
  #geocoder-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--text); padding: 10px 0;
    placeholder-color: var(--muted);
  }
  #geocoder-input::placeholder { color: var(--muted); }
  #geocoder-clear {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 2px 4px; font-size: 14px; line-height: 1;
    border-radius: 3px; transition: color 0.15s; display: none;
  }
  #geocoder-clear:hover { color: var(--text); }
  #geocoder-spinner {
    width: 11px; height: 11px; flex-shrink: 0;
    border: 1.5px solid rgba(71,200,255,0.2);
    border-top-color: var(--accent2); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }
  #geocoder-results {
    margin-top: 4px;
    background: rgba(10,12,15,0.97); border: 1px solid rgba(71,200,255,0.2);
    border-radius: 5px; backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    overflow: hidden; display: none;
  }
  #geocoder-results.visible { display: block; }
  .geocoder-item {
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  .geocoder-item:last-child { border-bottom: none; }
  .geocoder-item:hover, .geocoder-item.active {
    background: rgba(71,200,255,0.08);
  }
  .geocoder-item-name {
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .geocoder-item-detail {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .geocoder-no-results {
    padding: 12px 14px; font-size: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; text-align: center;
  }

  /* ── COG right-click context menu ── */
  #cog-context-menu {
    position: fixed; z-index: 99998; display: none;
    background: rgba(8,10,13,0.97); border: 1px solid rgba(71,200,255,0.25);
    border-radius: 6px; backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    min-width: 200px; overflow: hidden;
  }
  #cog-context-menu.visible { display: block; }
  .ctx-header {
    padding: 6px 12px 5px; color: var(--muted); font-size: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ctx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; color: var(--text); text-decoration: none;
    cursor: pointer; transition: background 0.1s;
  }
  .ctx-item:hover { background: rgba(71,200,255,0.08); color: var(--accent2); }
  .ctx-item-icon { font-size: 13px; flex-shrink: 0; }
  /* ── Debug window ── */
  #debug-win {
    position:fixed; bottom:16px; right:16px; z-index:99999;
    width:360px; max-width:calc(100vw - 32px);
    background:rgba(8,10,13,0.97); border:1px solid rgba(255,80,60,0.5);
    border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:10px;
    backdrop-filter:blur(8px); box-shadow:0 4px 24px rgba(255,60,40,0.15);
    user-select:none;
  }
  #debug-win.dragging { transition: none; }
  #debug-titlebar {
    display:flex; align-items:center; gap:6px; padding:5px 8px;
    border-bottom:1px solid rgba(255,80,60,0.2); cursor:grab;
    background:rgba(255,60,40,0.08); border-radius:6px 6px 0 0;
  }
  #debug-titlebar:active { cursor:grabbing; }
  #debug-badge {
    flex:1; font-size:9px; color:var(--muted);
    background:rgba(255,255,255,0.08); border-radius:3px; padding:1px 5px;
  }
  #debug-clear, #debug-toggle {
    background:transparent; border:none; color:var(--muted); cursor:pointer;
    font:10px 'JetBrains Mono',monospace; padding:2px 5px; border-radius:3px;
    transition:color 0.15s;
  }
  #debug-clear:hover, #debug-toggle:hover { color:var(--text); }
  #debug-body {
    max-height:200px; overflow-y:auto; padding:4px 0;
  }
  #debug-body::-webkit-scrollbar { width:3px; }
  #debug-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }
  .debug-row { padding:2px 8px; line-height:1.5; display:flex; gap:6px; word-break:break-all; }
  .debug-ts { color:rgba(255,255,255,0.2); flex-shrink:0; }
</style>
</head>
<body>

<div id="map"></div>

  <div>
    <h1><span style="color:#ffffff;text-transform:none;letter-spacing:0.05em;font-weight:700">mutant.kiwi</span> Aerial Imagery Explorer</h1>

  </div>
</div>

<div id="geocoder">
  <div id="geocoder-input-wrap">
    <svg id="geocoder-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>

    <div id="geocoder-spinner"></div>

  </div>
  <div id="geocoder-results"></div>
</div>

<div id="coords-bar">— , —</div>

<div id="instructions">
  <span>Click</span> anywhere on the map to find imagery<br>
  <span>621,728 sheets</span> across all of New Zealand
</div>

<button id="config-btn" title="Layer configuration">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
</button>

<div id="cog-context-menu">
  <div class="ctx-header" id="ctx-layer-name"></div>
  <a class="ctx-item" id="ctx-download-link" href="#" download>
    <span class="ctx-item-icon">↓</span> Download GeoTIFF
  </a>
</div>

<div id="cog-overlay-bar">
  <div id="cog-bar-header">
    <span id="cog-bar-header-title">SHEETS ON MAP</span>
    <span id="cog-bar-count"></span>
    <button id="cog-bar-dl-all" title="Download all rendered sheets">↓ all</button>
    <button id="cog-overlay-close">✕ clear all</button>
  </div>
  <div id="cog-bar-loading">
    <div class="cog-bar-spinner"></div>
    <span id="cog-bar-label">Loading…</span>
  </div>
  <div id="cog-bar-list"></div>
</div>

<div id="panel">
  <div id="panel-resize-handle"></div>
  <div id="panel-header">
    <div style="flex:1;min-width:0">
      <div id="panel-title">Imagery Results</div>
      <div id="panel-coords">—</div>
    </div>
    <div id="panel-count"><span class="n" id="count-n">0</span> found</div>
    <button id="close-btn" title="Close panel">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="results"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STARTUP CHECKS
// Log decoder library status to the debug panel on page load.
// This gives immediate visibility into which compression paths are
// available and confirms the page is ready to render COGs.
document.addEventListener('DOMContentLoaded', () => {
  debugInfo('GeoTIFF Pool ready — WEBP/LZW/Deflate/JPEG native; LERC+ZSTD via fallback');

  // When a decompression library becomes available, automatically re-render
  // any COGs that previously failed because the library wasn't ready yet.
  // This handles the race condition where a COG is opened before the CDN
  // script has finished loading.
  function retryErroredCogs(libName) {
    if (typeof _cogMap === 'undefined') return;
    const errored = [..._cogMap.values()].filter(e => e.status === 'error');
    if (errored.length) {
      debugInfo(libName + ' ready — retrying ' + errored.length + ' failed COG(s)…');
      errored.forEach(e => { e.status = 'rendering'; renderOneCog(e); });
      _updateCogBar();
    } else {
      debugInfo(libName + ' ready ✓');
    }
  }

  window._lercReady
    .then(() => retryErroredCogs('@esri/lerc'))
    .catch(err => debugInfo('@esri/lerc unavailable (' + err.message + ')'));

  window._zstdReady
    .then(() => retryErroredCogs('Zstd'))
    .catch(err => debugInfo('Zstd unavailable (' + err.message + ')'));
});
// ═══════════════════════════════════════════════════════════════════
// SENTRY / BUGSINK ERROR TRACKING
// Uses the Sentry JS SDK to forward errors to a self-hosted Bugsink
// instance. MapLibre sprite warnings are suppressed — they are noisy
// and not actionable. debugErr() also calls captureMessage() so
// COG render failures are tracked automatically.
// ═══════════════════════════════════════════════════════════════════
if (typeof Sentry !== 'undefined') {
  Sentry.init({
    dsn: "https://0947976df5d6405b80cf080d0ea4971a@mutantkiwi.bugsink.com/1",
    tracesSampleRate: 0.2,
    maxBreadcrumbs: 20,
    beforeSend(event) {
      // Suppress noisy MapLibre sprite warnings
      const msg = event.message || '';
      if (msg.includes('could not be loaded') || msg.includes('styleimagemissing')) return null;
      // Trim exception values to avoid 413 payload too large
      if (event.exception && event.exception.values) {
        event.exception.values = event.exception.values.slice(0, 3);
        event.exception.values.forEach(v => {
          if (v.stacktrace && v.stacktrace.frames) {
            v.stacktrace.frames = v.stacktrace.frames.slice(-10);
          }
        });
      }
      return event;
    }
  });
}
// ═══════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════

// FGB files are stored in EPSG:2193 (NZTM2000, metres).
// Map clicks arrive as WGS84 (EPSG:4326, lng/lat degrees).
// All spatial queries and COG viewport calculations use NZTM2000
// internally; results are reprojected back to WGS84 for MapLibre.
proj4.defs('EPSG:2193',
  '+proj=tmerc +lat_0=0 +lon_0=173 +k=0.9996 +x_0=1600000 +y_0=10000000 ' +
  '+ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
const toNZTM  = (lng, lat) => proj4('EPSG:4326', 'EPSG:2193', [lng, lat]);
const toWGS84 = (e, n)     => proj4('EPSG:2193', 'EPSG:4326', [e, n]);

// Master FGB — single file containing all 621,728 imagery sheets across NZ.
// Spatially indexed with Hilbert R-tree so only features intersecting the
// click bounding box are fetched via HTTP range requests.
const MASTER_FGB = 'https://imagery.mutant.kiwi/all_imagery.fgb';

const CONFIG = {
  mapStyle: 'https://tiles.openfreemap.org/styles/dark',
};

// ═══════════════════════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════════════════════
// Initialise MapLibre map centred on Northland, NZ.
// OpenFreeMap dark style provides the base tile layer.
const map = new maplibregl.Map({
  container: 'map',
  style: CONFIG.mapStyle,
  center: [174.0, -36.5], // New Zealand (Northland area)
  zoom: 7,
  attributionControl: false,
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-left');
map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

// Live coordinate display in bottom-left bar as the mouse moves.
map.on('mousemove', e => {
  document.getElementById('coords-bar').textContent =
    `${e.lngLat.lat.toFixed(6)}, ${e.lngLat.lng.toFixed(6)}`;
});

// Places an animated pulse marker at the last-clicked map position.
// Removes any previous marker before adding the new one.
let clickMarker = null;
function placeMarker(lngLat) {
  if (clickMarker) clickMarker.remove();
  const el = document.createElement('div');
  el.className = 'click-marker';
  clickMarker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(lngLat).addTo(map);
}

// ═══════════════════════════════════════════════════════════════════
// PANEL STATE
// ═══════════════════════════════════════════════════════════════════
const panel      = document.getElementById('panel');
const resultsEl  = document.getElementById('results');
let _pinnedLayerUrl = null; // layer URL whose card should stay expanded
const countEl    = document.getElementById('count-n');
const progressEl = document.getElementById('progress-bar');
const panelCoord = document.getElementById('panel-coords');

// Tracks the active query token so stale queries can be cancelled
// when the user clicks a new location.
let currentQuery = null;

// Slides the debug panel left when the results panel is open,
// so they don't overlap. Skipped if the user has manually dragged it.
function _shiftDebug(panelOpen) {
  const dbg = document.getElementById('debug-win');
  if (!dbg || dbg._dragged) return;
  dbg.style.right = panelOpen ? 'calc(var(--panel-w) + 16px)' : '16px';
}

// Show/hide the results side panel and shift debug window accordingly.
function openPanel()  {
  panel.classList.add('open');
  _shiftDebug(true);
}
function closePanel() {
  panel.classList.remove('open');
  _shiftDebug(false);
}

// ── Panel resize (drag left edge) ─────────────────────────────────────────────
(function() {
  const panel  = document.getElementById('panel');
  const handle = document.getElementById('panel-resize-handle');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = panel.offsetWidth;
    panel.classList.add('resizing');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;          // drag left = wider
    const newW  = Math.min(800, Math.max(280, startW + delta));
    panel.style.width = newW + 'px';
    document.documentElement.style.setProperty('--panel-w', newW + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    panel.classList.remove('resizing');
  });
})();

document.getElementById('close-btn').onclick = () => {
  closePanel();
  clearFootprint();
  _pinnedLayerUrl = null;
  if (clickMarker) clickMarker.remove();
  clickMarker = null;
  if (currentQuery) currentQuery.cancelled = true;
};

// ═══════════════════════════════════════════════════════════════════
// QUERY ENGINE
// ═══════════════════════════════════════════════════════════════════

// Query the master FGB for all imagery sheets intersecting a map click.
//
// One HTTP request against the single spatially-indexed all_imagery.fgb
// replaces what was previously 650 parallel per-layer requests.
// The Hilbert R-tree in the FGB means only features within the bounding
// box are streamed — typically a few dozen KB for any given click location.
//
// @param {number}  lngWGS - Click longitude (WGS84)
// @param {number}  latWGS - Click latitude (WGS84)
// @param {object}  token  - Cancellation token { cancelled: bool }
// @returns {Feature[]}
async function queryFlatGeobuf(lngWGS, latWGS, token) {
  if (token.cancelled) return [];

  // Convert WGS84 click to NZTM2000 metres (EPSG:2193) — FGB is in this CRS
  const [e, n] = toNZTM(lngWGS, latWGS);
  const d = 1000; // 1 km bbox buffer — tight is fine with a spatial index
  const rect = { minX: e - d, minY: n - d, maxX: e + d, maxY: n + d };

  try {
    const results = [];
    let featureCount = 0;
    for await (const feature of flatgeobuf.deserialize(MASTER_FGB, rect)) {
      featureCount++;
      if (token.cancelled) break;
      // Precise point-in-polygon test in NZTM2000 space
      if (pointInFeature(e, n, feature)) {
        // Reproject geometry to WGS84 for MapLibre footprint overlay
        feature.geometry = reprojectGeom(feature.geometry);
        results.push(feature);
      }
    }
    debugLog(`${featureCount} bbox hits, ${results.length} matched — click query`);
    return results;
  } catch (err) {
    debugLog(`ERR queryFlatGeobuf: ${err.message.slice(0, 80)}`);
    return [];
  }
}

// Reproject a GeoJSON geometry from NZTM2000 (EPSG:2193) to WGS84.
// Handles Polygon and MultiPolygon; returns other types unchanged.
function reprojectGeom(geom) {
  if (!geom) return geom;
  const rr = ring => ring.map(([x, y]) => toWGS84(x, y));
  if (geom.type === 'Polygon')      return { ...geom, coordinates: geom.coordinates.map(rr) };
  if (geom.type === 'MultiPolygon') return { ...geom, coordinates: geom.coordinates.map(p => p.map(rr)) };
  return geom;
}

// ═══════════════════════════════════════════════════════════════════
// DEBUG WINDOW
// ═══════════════════════════════════════════════════════════════════
// Ring buffer of debug log entries (max 200). Each entry: { ts, level, msg }.
// Displayed in the floating debug panel (bottom-right, red border).
const _debugEntries = [];
let _debugVisible = true;

// Build and inject the debug panel DOM. Called on DOMContentLoaded.
// The panel shows timestamped log entries with colour-coded severity.
function _buildDebugUI() {
  const el = document.createElement('div');
  el.id = 'debug-win';
  el.innerHTML = `
    <div id="debug-titlebar">
      <span style="color:#ff4f3b;font-weight:700;letter-spacing:.1em">DEBUG</span>
      <span id="debug-badge">0</span>
      <button id="debug-clear" title="Clear">✕ clear</button>
      <button id="debug-toggle" title="Minimise">▾</button>
    </div>
    <div id="debug-body"></div>`;
  document.body.appendChild(el);
  document.getElementById('debug-clear').onclick  = () => { _debugEntries.length = 0; _renderDebug(); };
  document.getElementById('debug-toggle').onclick = () => {
    _debugVisible = !_debugVisible;
    document.getElementById('debug-body').style.display = _debugVisible ? 'block' : 'none';
    document.getElementById('debug-toggle').textContent = _debugVisible ? '▾' : '▸';
  };

  // ── Drag to reposition ───────────────────────────────────────────
  (function() {
    const titlebar = document.getElementById('debug-titlebar');
    let dragging = false, ox = 0, oy = 0;

    titlebar.addEventListener('mousedown', e => {
      if (e.target.closest('button')) return; // don't drag when clicking buttons
      dragging = true;
      const rect = el.getBoundingClientRect();
      ox = e.clientX - rect.left;
      oy = e.clientY - rect.top;
      el.classList.add('dragging');
      // Switch from right/bottom anchoring to left/top so drag coords work
      el.style.right  = 'auto';
      el.style.bottom = 'auto';
      el.style.left   = rect.left + 'px';
      el.style.top    = rect.top  + 'px';
      el._dragged = true;
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const x = Math.min(window.innerWidth  - el.offsetWidth,  Math.max(0, e.clientX - ox));
      const y = Math.min(window.innerHeight - el.offsetHeight, Math.max(0, e.clientY - oy));
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      el.classList.remove('dragging');
    });
  })();
}

// Re-render the debug panel body from _debugEntries.
// Updates the badge count and highlights error count in red.
function _renderDebug() {
  const body  = document.getElementById('debug-body');
  const badge = document.getElementById('debug-badge');
  if (!body) return;
  const errors = _debugEntries.filter(e => e.level === 'error').length;
  badge.textContent = _debugEntries.length + (errors ? ' · ' + errors + ' err' : '');
  badge.style.background = errors ? 'rgba(255,107,71,0.3)' : 'rgba(255,255,255,0.08)';
  body.innerHTML = _debugEntries.slice(0, 60).map(e => {
    const col = e.level === 'error' ? '#ff6b47' : e.level === 'warn' ? '#e8ff47' : '#a0aec0';
    return `<div class="debug-row" style="color:${col}"><span class="debug-ts">${e.ts}</span><span>${escHtml(e.msg)}</span></div>`;
  }).join('');
}

// Core log function. Adds an entry to _debugEntries, forwards errors
// to Sentry, and re-shows the debug panel if it was minimised.
// @param {string} msg   - Message text
// @param {string} level - 'info' | 'warn' | 'error'
function debugLog(msg, level) {
  const lvl = level || (msg.startsWith('ERR') || msg.startsWith('\u26a0') ? 'error' : 'warn');
  const ts  = new Date().toTimeString().slice(0,8);
  console[lvl === 'error' ? 'error' : 'warn']('[DBG]', msg);
  _debugEntries.unshift({ ts, level: lvl, msg });
  if (_debugEntries.length > 200) _debugEntries.pop();
  // Forward errors to Sentry
  if (lvl === 'error' && typeof Sentry !== 'undefined') {
    Sentry.captureMessage(msg, 'error');
  }
  // Re-show debug window on new log entry
  const dbg = document.getElementById('debug-win');
  if (dbg) {
    dbg.style.display = 'block';
    _debugVisible = true;
    const body = document.getElementById('debug-body');
    if (body) body.style.display = 'block';
    const tog = document.getElementById('debug-toggle');
    if (tog) tog.textContent = '▾';
  }
  _renderDebug();
}

// Convenience wrappers for the two most common log levels.
function debugInfo(msg) { debugLog(msg, 'info'); }
function debugErr(msg)  { debugLog(msg, 'error'); }

// Intercept console.error/warn globally so all library errors (MapLibre,
// GeoTIFF.js, etc.) also appear in the debug panel and are forwarded
// to Sentry. The _dbgInProgress flag prevents infinite recursion.
let _dbgInProgress = false;
const _origError = console.error.bind(console);
const _origWarn  = console.warn.bind(console);
console.error = (...args) => {
  _origError(...args);
  if (_dbgInProgress) return;
  _dbgInProgress = true;
  try { debugLog(args.map(a => (a instanceof Error ? a.message : String(a))).join(' '), 'error'); }
  finally { _dbgInProgress = false; }
};
console.warn = (...args) => {
  _origWarn(...args);
  if (_dbgInProgress || args[0] === '[DBG]') return;
  const msg = args[0];
  if (typeof msg === 'string' && (msg.includes('could not be loaded') || msg.includes('styleimagemissing') || msg.includes('addImage'))) return;
  _dbgInProgress = true;
  try { debugLog(args.map(a => (a instanceof Error ? a.message : String(a))).join(' '), 'warn'); }
  finally { _dbgInProgress = false; }
};

document.addEventListener('DOMContentLoaded', _buildDebugUI);

// Test whether a NZTM2000 point (lng=easting, lat=northing) falls
// inside a GeoJSON feature's polygon or multipolygon geometry.
function pointInFeature(lng, lat, feature) {
  const geom = feature.geometry;
  if (!geom) return false;
  const polys = geom.type === 'Polygon'      ? [geom.coordinates]
              : geom.type === 'MultiPolygon' ? geom.coordinates
              : [];
  return polys.some(poly => pointInPolygon(lng, lat, poly[0]));
}

// Ray-casting point-in-polygon test for a single ring.
// Returns true if (x, y) is inside the coordinate ring.
function pointInPolygon(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ═══════════════════════════════════════════════════════════════════
// MAIN CLICK HANDLER
// ═══════════════════════════════════════════════════════════════════
map.on('click', async e => {
  // Ignore clicks that land on an extents polygon — those fire loadCogOnMap directly.
  const extentsFillIds = [..._extentsLayers.values()].map(v => v.fillId);
  const hitExtents = extentsFillIds.length && map.queryRenderedFeatures(e.point, { layers: extentsFillIds }).length > 0;
  if (hitExtents) return;

  const { lng, lat } = e.lngLat;
  placeMarker(e.lngLat);

  const coordEl = document.getElementById('coords-bar');
  coordEl.classList.add('active');
  setTimeout(() => coordEl.classList.remove('active'), 800);

  if (currentQuery) currentQuery.cancelled = true;
  clearFootprint();
  const token = { cancelled: false };
  currentQuery = token;

  document.getElementById('instructions').classList.add('hidden');
  panelCoord.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
  countEl.textContent = '…';
  resultsEl.innerHTML = '';
  openPanel();

  resultsEl.innerHTML = `
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Searching <strong>621,728</strong> imagery sheets…</p>
    </div>`;
  progressEl.style.width = '0%';

  window._lastResults = [];

  // Single query against the master spatially-indexed FGB.
  progressEl.style.width = '40%';
  const features = await queryFlatGeobuf(lng, lat, token);
  if (token.cancelled) return;

  progressEl.style.width = '90%';

  // Sort by year descending (newest first) — most relevant imagery on top.
  // Features without a year sort to the bottom.
  features.sort((a, b) => {
    const ya = (a.properties.year || '').split('-')[0] || '0';
    const yb = (b.properties.year || '').split('-')[0] || '0';
    return parseInt(yb) - parseInt(ya);
  });

  window._lastResults = features;
  const total = features.length;
  countEl.textContent = total;

  // Show limit slider when there are more than 10 results
  features.forEach((f, i) => appendCard(f, i + 1));
  const found = total;

  progressEl.style.width = '100%';
  setTimeout(() => { progressEl.style.width = '0'; }, 600);

  if (found === 0 && !token.cancelled) {
    resultsEl.innerHTML = `
      <div class="state-msg">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>No imagery found at this location.<br>Try clicking within a surveyed area.</p>
      </div>`;
  }
});

// ═══════════════════════════════════════════════════════════════════
// CARD RENDERING
// ═══════════════════════════════════════════════════════════════════
// Build and append a result card for a single matched feature from the master FGB.
// Each feature represents one imagery sheet (series + tile).
// Cards are collapsible; expanding one collapses others.
//
// Fields used from the master FGB:
//   title          — human readable name e.g. "Northland 0.1m Urban Aerial Photos (2014-2015)"
//   title_unicode  — series identifier e.g. "northland_2014_2015_0_1m"
//   region         — region name e.g. "northland"
//   year           — extracted from title e.g. "2014-2015"
//   asset_id       — tile identifier e.g. "AW30_500_020059"
//   asset_url_image — full S3 URL to the COG .tiff file
//
// @param {Feature} feature - GeoJSON feature from master FGB
// @param {number}  index   - 1-based display index
function appendCard(feature, index) {
  const props    = feature.properties || {};
  const imageUrl = props.asset_url_image || '';

  // Label shown in the card header — title is most readable
  const label    = props.title || props.title_unicode || 'Unknown series';

  // Metadata rows shown in the expanded card body
  const SHOW_KEYS = ['region', 'year', 'asset_id', 'title_unicode'];
  const metaKeys  = SHOW_KEYS.filter(k => props[k] != null && props[k] !== '');

  const existingMsg = resultsEl.querySelector('.state-msg');
  if (existingMsg) existingMsg.remove();

  const card = document.createElement('div');
  card.className = 'result-card';
  card.dataset.index = index;
  // Use title_unicode as the card key (stable series identifier)
  card.dataset.layerUrl = props.title_unicode || String(index);
  if (card.dataset.layerUrl === _pinnedLayerUrl) card.classList.add('expanded');

  card.innerHTML = `
    <div class="card-header">
      <div class="card-index">${index}</div>
      <div class="card-info">
        <div class="card-layer">${escHtml(label)}</div>
        <div class="card-feat">${escHtml(props.asset_id || props.title_unicode || '')}</div>
      </div>
      <svg class="card-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="card-body">
      ${metaKeys.length ? `
        <table class="meta-table">
          ${metaKeys.map(k => `<tr><td>${escHtml(k)}</td><td>${escHtml(String(props[k]))}</td></tr>`).join('')}
        </table>` : ''}
      <div class="card-actions">
        ${imageUrl ? `
        <button class="btn btn-secondary" style="border-color:var(--accent);color:var(--accent)"
          data-cog-url="${escHtml(imageUrl)}"
          data-cog-label="${escHtml(label)}"
          data-cog-title-unicode="${escHtml(props.title_unicode || '')}"
          data-cog-asset-id="${escHtml(props.asset_id || '')}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Open on Map
        </button>
` : ''}

      </div>
    </div>`;

  // Store feature reference on card element for footprint display
  card._feature = feature;

  card.addEventListener('mouseenter', () => showFootprint(feature, false));
  card.addEventListener('mouseleave', () => { if (!card.classList.contains('footprint-active')) clearFootprintIfHover(); });

  resultsEl.appendChild(card);
}


// Convert geotiff.js raster band arrays to a flat RGBA Uint8ClampedArray
// suitable for ImageData / canvas rendering.
// Handles grayscale (1 band), RGB (3 bands), and RGBA (4 bands).
// Values > 255 are assumed to be 16-bit and are scaled by dividing by 256.
function toRGBA(bands, w, h) {
  const n = w * h;
  const out = new Uint8ClampedArray(n * 4);

  // geotiff.js Pool decoding WEBP tiles may return a single interleaved
  // array of length w*h*3 (RGB) or w*h*4 (RGBA) instead of separate bands.
  // Detect this case by checking if the first band is longer than w*h.
  if (bands.length === 1 && bands[0].length === n * 4) {
    // Already interleaved RGBA
    const src = bands[0];
    for (let i = 0; i < n; i++) {
      out[i*4]   = src[i*4];
      out[i*4+1] = src[i*4+1];
      out[i*4+2] = src[i*4+2];
      out[i*4+3] = src[i*4+3];
    }
  } else if (bands.length === 1 && bands[0].length === n * 3) {
    // Interleaved RGB
    const src = bands[0];
    for (let i = 0; i < n; i++) {
      out[i*4]   = src[i*3];
      out[i*4+1] = src[i*3+1];
      out[i*4+2] = src[i*3+2];
      out[i*4+3] = 255;
    }
  } else if (bands.length === 1) {
    // Grayscale
    for (let i = 0; i < n; i++) {
      const v = bands[0][i];
      out[i*4] = v; out[i*4+1] = v; out[i*4+2] = v; out[i*4+3] = 255;
    }
  } else {
    // Separate bands (standard path for LZW, Deflate, ZSTD, LERC)
    for (let i = 0; i < n; i++) {
      out[i*4]   = normalise(bands[0][i]);
      out[i*4+1] = normalise(bands[1] ? bands[1][i] : 0);
      out[i*4+2] = normalise(bands[2] ? bands[2][i] : 0);
      out[i*4+3] = bands[3] ? bands[3][i] : 255;
    }
  }
  return out;
}
// Scale a pixel value to 8-bit range (handles 16-bit source data).
function normalise(v) { return v > 255 ? Math.round(v / 256) : v; }

// ═══════════════════════════════════════════════════════════════════
// FOOTPRINT OVERLAY — shows polygon bounds on hover/click
// ═══════════════════════════════════════════════════════════════════
const FP_SOURCE = 'footprint-source';
const FP_FILL   = 'footprint-fill';
const FP_LINE   = 'footprint-line';
let _fpPinned = false;

map.on('load', () => {
  map.addSource(FP_SOURCE, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({ id: FP_FILL, type: 'fill', source: FP_SOURCE,
    paint: { 'fill-color': '#47c8ff', 'fill-opacity': 0.1 } });
  map.addLayer({ id: FP_LINE, type: 'line', source: FP_SOURCE,
    paint: { 'line-color': '#47c8ff', 'line-width': 2, 'line-opacity': 0.9 } });
});

// Show a feature's polygon footprint on the map.
// If pin=true, locks the footprint until clearFootprint() is called.
function showFootprint(feature, pin) {
  if (!feature || !feature.geometry) return;
  if (pin) {
    _fpPinned = true;
    document.querySelectorAll('.result-card.footprint-active').forEach(el => el.classList.remove('footprint-active'));
  }
  const src = map.getSource(FP_SOURCE);
  if (src) src.setData({ type: 'FeatureCollection',
    features: [{ type: 'Feature', geometry: feature.geometry, properties: {} }] });
}

// Clear the footprint only if it is not pinned (hover-only state).
function clearFootprintIfHover() {
  if (_fpPinned) return;
  const src = map.getSource(FP_SOURCE);
  if (src) src.setData({ type: 'FeatureCollection', features: [] });
}

// Fully clear the footprint and unpin it (called on panel close).
function clearFootprint() {
  _fpPinned = false;
  document.querySelectorAll('.result-card.footprint-active').forEach(el => el.classList.remove('footprint-active'));
  const src = map.getSource(FP_SOURCE);
  if (src) src.setData({ type: 'FeatureCollection', features: [] });
}
