// LAYER EXTENTS OVERLAY
// Streams the full FGB file and shows all footprints on the map.
// Each layer gets its own source/layer; toggling removes it.
// ═══════════════════════════════════════════════════════════════════
const _extentsLayers = new Map(); // layerUrl -> { sourceId, fillId, lineId }

// Update the Show/Hide Extents button label and styling to reflect
// the current load state: 'loading' | 'hide' | 'show' | 'failed'
function _setExtentsBtn(btn, state) {
  btn.disabled = false;
  btn.style.borderColor = '';
  btn.style.color = '';
  const svgBox = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3,9 3,3 9,3"/><polyline points="21,9 21,3 15,3"/><polyline points="3,15 3,21 9,21"/><polyline points="21,15 21,21 15,21"/></svg>';
  if (state === 'loading') {
    btn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg> Loading…';
    btn.style.borderColor = 'var(--accent2)'; btn.style.color = 'var(--accent2)';
    btn.disabled = true;
  } else if (state === 'hide') {
    btn.innerHTML = svgBox + ' Hide Extents';
    btn.style.borderColor = '#e8ff47'; btn.style.color = '#e8ff47';
  } else if (state === 'failed') {
    btn.innerHTML = '⚠ Failed';
  } else {
    btn.innerHTML = svgBox + ' Show Extents';
  }
}

// Remove an extents layer and its MapLibre source/layers from the map.
// Cleans up all event listeners and resets the toggle button.
function _removeExtentsEntry(key, btn) {
  const entry = _extentsLayers.get(key);
  if (!entry) return;
  const { sourceId, fillId, lineId, clickHandler, onEnter, onLeave } = entry;
  if (clickHandler) map.off('click',      fillId, clickHandler);
  if (onEnter)      map.off('mouseenter', fillId, onEnter);
  if (onLeave)      map.off('mouseleave', fillId, onLeave);
  try { if (map.getLayer(lineId))    map.removeLayer(lineId);    } catch(e) {}
  try { if (map.getLayer(fillId))    map.removeLayer(fillId);    } catch(e) {}
  try { if (map.getSource(sourceId)) map.removeSource(sourceId); } catch(e) {}
  map.getCanvas().style.cursor = '';
  _extentsLayers.delete(key);
  if (btn) _setExtentsBtn(btn, 'show');
}

// Toggle the spatial extents overlay for a series on/off.
// Streams all sheets for a given title_unicode from the master FGB
// using a world-covering rect, filters by title_unicode client-side.
// On hide: removes the layers and cleans up listeners.
//
// @param {string}      titleUnicode - Series identifier e.g. "northland_2014_2015_0_1m"
// @param {string}      label        - Human readable series name for debug messages
// @param {HTMLElement} btn          - The toggle button element
async function toggleLayerExtents(titleUnicode, label, btn) {
  const key = titleUnicode;

  // Already shown — remove
  if (_extentsLayers.has(key)) {
    _removeExtentsEntry(key, btn);
    _pinnedLayerUrl = null;
    return;
  }

  // Pin this series card open
  _pinnedLayerUrl = key;
  const parentCard = btn.closest('.result-card');
  if (parentCard) {
    resultsEl.querySelectorAll('.result-card.expanded').forEach(c => c.classList.remove('expanded'));
    parentCard.classList.add('expanded');
  }

  _setExtentsBtn(btn, 'loading');

  // Stream the per-series FGB directly — much faster than filtering master FGB.
  // URL is constructed from title_unicode which exactly matches the S3 filename.
  const seriesFgbUrl = 'https://imagery.mutant.kiwi/layers/' + titleUnicode + '.fgb';
  // Query master FGB filtered by title_unicode using a 1km bbox around NZ
  // then filter client-side. This avoids needing per-series FGB files.
  const worldRect = { minX: 1083999, minY: 4721999, maxX: 2471278, maxY: 6234001 };
  const features = [];
  try {
    debugInfo('Extents: querying master FGB for ' + titleUnicode);
    for await (const f of flatgeobuf.deserialize(MASTER_FGB, worldRect)) {
      if (f.properties && f.properties.title_unicode === titleUnicode) {
        const geom = reprojectGeom(f.geometry);
        if (geom) features.push({ type: 'Feature', geometry: geom, properties: f.properties || {} });
      }
    }
    debugInfo('Extents OK: ' + features.length + ' features for ' + titleUnicode);
  } catch(err) {
    debugErr('Extents stream: ' + err.message);
    _setExtentsBtn(btn, 'failed');
    return;
  }

  if (!features.length) {
    debugErr('Extents: 0 features returned');
    _setExtentsBtn(btn, 'failed');
    return;
  }

  const base     = 'ext-' + key.split('/').pop().replace(/\W/g, '_').slice(0, 40);
  const sourceId = base + '-src';
  const fillId   = base + '-fill';
  const lineId   = base + '-line';

  try {
    map.addSource(sourceId, { type: 'geojson', data: { type: 'FeatureCollection', features } });
    map.addLayer({ id: fillId, type: 'fill', source: sourceId,
      paint: { 'fill-color': '#e8ff47', 'fill-opacity': 0.04 } });
    map.addLayer({ id: lineId, type: 'line', source: sourceId,
      paint: { 'line-color': '#e8ff47', 'line-width': 1, 'line-opacity': 0.7 } });
  } catch(err) {
    debugErr('Extents map add: ' + err.message);
    _setExtentsBtn(btn, 'failed');
    return;
  }

  // Store entry first so clickHandler closure can reference it safely
  const entry = { sourceId, fillId, lineId, clickHandler: null, onEnter: null, onLeave: null };
  _extentsLayers.set(key, entry);
  _setExtentsBtn(btn, 'hide');

  // Click polygon → open COG on map
  entry.clickHandler = (e) => {
    e.preventDefault();
    e.originalEvent && e.originalEvent.stopPropagation();
    const feat = e.features && e.features[0];
    if (!feat) return;
    const cogUrl = feat.properties.asset_url_image;
    if (!cogUrl) { debugErr('No asset_url_image on clicked feature'); return; }
    debugInfo('Extents click COG URL: ' + cogUrl);
    const assetId      = feat.properties.asset_id || feat.properties.assest_id || _assetIdFromUrl(cogUrl);
    const titleUnicode = feat.properties.title_unicode || '';
    // Use the series label passed from the card (has the full human-readable title)
    // rather than title_unicode which is the machine-readable series identifier.
    loadCogOnMap(cogUrl, label, assetId, titleUnicode);
  };
  entry.onEnter = () => { map.getCanvas().style.cursor = 'pointer'; };
  entry.onLeave = () => { map.getCanvas().style.cursor = ''; };

  map.on('click',      fillId, entry.clickHandler);
  map.on('mouseenter', fillId, entry.onEnter);
  map.on('mouseleave', fillId, entry.onLeave);
}


// ═══════════════════════════════════════════════════════════════════
// MULTI-COG MAP OVERLAY
// Each loaded COG gets its own MapLibre image source and raster layer,
// both keyed by URL. The _cogMap Map tracks all active entries.
//
// On every map moveend, renderAllCogs() re-fetches the visible tile
// window for each COG at the new viewport bounds and resolution.
//
// Compression routing (readRastersWithFallback):
//   WEBP (50002)        → geotiff.js Pool (native browser WebP)
//   LZW/Deflate (5/8)   → geotiff.js Pool (native)
//   LERC (50000/50001)  → readRastersLerc() via @esri/lerc
//   ZSTD (50003)        → readRastersZstd() via ZstdCodec/fzstd
// ═══════════════════════════════════════════════════════════════════
// GeoTIFF decoder pool — required for WEBP-compressed COG tiles
const cogPool = new GeoTIFF.Pool();
const _cogMap  = new Map(); // url -> { tiff, image, minE,minN,maxE,maxN, label, sourceId, layerId, token }

// Extract a bare asset ID from a COG URL by stripping the path and extension.
// Used as a fallback when assest_id is not in the feature properties.
function _assetIdFromUrl(url) {
  return (url || '').split('/').pop().replace(/\.[^.]+$/, '');
}

// Download filename: title_unicode_assetId.tif
function _cogDownloadName(entry) {
  const ext = (entry.url.split('.').pop() || 'tif').toLowerCase();
  return entry.titleUnicode + '_' + entry.assetId + '.' + ext;
}

// Fetch file and trigger save-as with correct filename (bypasses cross-origin download attr restriction)
async function blobDownload(url, filename) {
  debugInfo('Downloading ' + filename + '…');
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    debugInfo('Download ready: ' + filename);
  } catch(err) {
    debugErr('Download failed: ' + err.message);
  }
}

// Generate stable, unique MapLibre source and layer IDs for a COG URL.
// IDs are based on a slug of the filename so they are human-readable
// in the MapLibre style inspector.
function _cogIds(url) {
  // Hash the full URL to guarantee uniqueness regardless of path structure.
  // Using a simple djb2 hash — fast, no crypto needed.
  let h = 5381;
  for (let i = 0; i < url.length; i++) h = ((h << 5) + h) ^ url.charCodeAt(i);
  const hash = (h >>> 0).toString(36); // unsigned 32-bit base36
  return { sourceId: 'cog-' + hash + '-src', layerId: 'cog-' + hash + '-lyr' };
}

// Remove one COG overlay (by URL) or all overlays (no argument).
// Cancels any in-flight render by invalidating the entry token,
// removes the MapLibre source and layer, and updates the bar.
function removeCogOverlay(url) {
  if (url) {
    const entry = _cogMap.get(url);
    if (!entry) return;
    entry.token = -1;
    if (entry._blobUrl) URL.revokeObjectURL(entry._blobUrl);
    try { if (map.getLayer(entry.layerId))   map.removeLayer(entry.layerId);   } catch(e) {}
    try { if (map.getSource(entry.sourceId)) map.removeSource(entry.sourceId); } catch(e) {}
    _cogMap.delete(url);
  } else {
    // Remove all
    _cogMap.forEach((entry, u) => removeCogOverlay(u));
  }
  _updateCogBar();
}

// Rebuild the floating "SHEETS ON MAP" pill from the current _cogMap state.
// Each row shows: status icon | layer label | asset ID | download ↓ | remove ✕
// Status icons: spinning = rendering, ✓ = done, ! = error.
// The download link uses blobDownload() to force the correct filename
// (cross-origin <a download> is ignored by browsers).
function _updateCogBar() {
  const bar     = document.getElementById('cog-overlay-bar');
  const list    = document.getElementById('cog-bar-list');
  const count   = document.getElementById('cog-bar-count');

  if (_cogMap.size === 0) {
    bar.classList.remove('visible');
    return;
  }

  bar.classList.add('visible');
  count.textContent = _cogMap.size + ' sheet' + (_cogMap.size !== 1 ? 's' : '');

  const entries = [..._cogMap.entries()];
  list.innerHTML = entries.map(([url, e], idx) => {
    const visible    = e.visible !== false;
    const tickCls    = visible ? 'row-tick' : 'row-tick hidden';
    const tickIcon   = visible ? '\u2713' : '\u25ef';
    const statusHtml = e.status === 'done'
      ? `<span class="${tickCls}" data-toggle-layer-id="${escHtml(e.layerId)}" title="Toggle layer">${tickIcon}</span>`
      : e.status === 'error' ? '<span class="row-err">!</span>'
      : '<div class="row-spinner"></div>';
    const opacity = e.opacity !== undefined ? e.opacity : 0.9;
    const opPct   = Math.round(opacity * 100);
    return `
    <div class="cog-bar-row" data-row-idx="${idx}">
      <span class="cog-bar-row-status">${statusHtml}</span>
      <span class="cog-bar-row-label" title="${escHtml(e.label)}">${escHtml(e.label)}</span>
      <span class="cog-bar-row-asset">${escHtml(e.assetId || '—')}</span>
      <div class="cog-bar-row-opacity">
        <input class="cog-opacity-slider" type="range" min="0" max="100" step="5"
          value="${opPct}" data-layer-id="${escHtml(e.layerId)}" title="Opacity">
        <span class="cog-bar-row-opacity-label">${opPct}%</span>
      </div>
      <a class="cog-bar-row-dl" href="#" data-dl-url="${escHtml(url)}" data-dl-name="${escHtml(_cogDownloadName(e))}" title="Download GeoTIFF">↓</a>
      <button class="cog-bar-row-remove" data-remove-url="${escHtml(url)}">✕</button>
    </div>`;
  }).join('');

  list.querySelectorAll('[data-remove-url]').forEach(btn => {
    btn.addEventListener('click', () => removeCogOverlay(btn.dataset.removeUrl));
  });
  list.querySelectorAll('[data-dl-url]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); blobDownload(a.dataset.dlUrl, a.dataset.dlName); });
  });
  list.querySelectorAll('.cog-opacity-slider').forEach(slider => {
    slider.addEventListener('input', () => {
      const layerId = slider.dataset.layerId;
      const opacity = parseInt(slider.value) / 100;
      // Update the % label next to this slider
      const labelEl = slider.nextElementSibling;
      if (labelEl) labelEl.textContent = Math.round(opacity * 100) + '%';
      // Find entry by layerId directly in _cogMap — no stale closure
      for (const entry of _cogMap.values()) {
        if (entry.layerId === layerId) {
          entry.opacity = opacity;
          if (map.getLayer(layerId)) {
            map.setPaintProperty(layerId, 'raster-opacity', opacity);
          }
          break;
        }
      }
    });
  });

  // ── Tick click — toggle individual layer visibility ──────────────
  list.querySelectorAll('[data-toggle-layer-id]').forEach(tick => {
    tick.addEventListener('click', () => {
      const layerId = tick.dataset.toggleLayerId;
      for (const entry of _cogMap.values()) {
        if (entry.layerId === layerId) {
          entry.visible = entry.visible === false ? true : false;
          const vis = entry.visible ? 'visible' : 'none';
          if (map.getLayer(layerId)) map.setLayoutProperty(layerId, 'visibility', vis);
          _updateCogBar(); // redraw to reflect new state
          _syncToggleAllBtn();
          break;
        }
      }
    });
  });

  _syncToggleAllBtn();
}

// Update the toggle-all button label/style based on current state
function _syncToggleAllBtn() {
  const btn = document.getElementById('cog-bar-toggle-all');
  if (!btn) return;
  const allOff = [..._cogMap.values()].every(e => e.visible === false);
  btn.textContent = allOff ? '◯ all off' : '◉ all on';
  btn.classList.toggle('all-off', allOff);
}

// Open a COG on the map. Fetches the TIFF header, stores the entry in
// _cogMap, zooms to the COG's bounding box, then triggers renderOneCog().
// Duplicate loads (same URL already in _cogMap) are skipped — the
// existing overlay is just re-rendered at the current viewport.
//
// @param {string} url          - Full URL of the COG .tif file
// @param {string} label        - Human-readable layer name (from CONFIG)
// @param {string} assetId      - From FGB feature property 'assest_id'
// @param {string} titleUnicode - From FGB feature property 'title_unicode'
async function loadCogOnMap(url, label, assetId, titleUnicode) {
  // If already loaded, just re-render (no duplicate)
  if (_cogMap.has(url)) {
    debugInfo('COG already on map: ' + url.split('/').pop());
    renderOneCog(_cogMap.get(url));
    return;
  }

  const barLabel = document.getElementById('cog-bar-label');
  const loading  = document.getElementById('cog-bar-loading');
  document.getElementById('cog-overlay-bar').classList.add('visible');
  loading.style.display = 'flex';
  barLabel.textContent = 'Loading ' + label + '…';

  try {
    const tiff  = await GeoTIFF.fromUrl(url, { allowFullFile: true });
    tiff._sourceUrl = url; // needed for LERC tile-fetch fallback
    const imageCount = await tiff.getImageCount();
    tiff._imageCount = imageCount; // cache for overview selection
    const image = await tiff.getImage(0); // full-res image for bbox + metadata
    const [minE, minN, maxE, maxN] = image.getBoundingBox();
    const [swLng, swLat] = toWGS84(minE, minN);
    const [nwLng, nwLat] = toWGS84(minE, maxN);
    const [neLng, neLat] = toWGS84(maxE, maxN);
    const [seLng, seLat] = toWGS84(maxE, minN);
    const { sourceId, layerId } = _cogIds(url);

    const entry = { tiff, image, minE, minN, maxE, maxN, label, url,
                    assetId: assetId,
                    titleUnicode: titleUnicode,
                    opacity: 0.9,
                    visible: true,
                    sourceId, layerId, token: 0, status: 'rendering',
                    nwLng, nwLat, neLng, neLat, seLng, seLat, swLng, swLat };
    _cogMap.set(url, entry);
    loading.style.display = 'none';
    _updateCogBar();

    // Zoom to this COG's extents
    map.fitBounds(
      [[Math.min(swLng, nwLng), Math.min(swLat, seLat)],
       [Math.max(neLng, seLng), Math.max(nwLat, neLat)]],
      { padding: 60, duration: 800 }
    );

    renderOneCog(entry);

  } catch (err) {
    loading.style.display = 'none';
    barLabel.textContent = '⚠ Failed: ' + err.message.slice(0, 80);
    loading.style.display = 'flex';
    console.error('COG load error:', err);
  }
}



// Attempt readRasters via geotiff.js Pool (handles WEBP/LZW/Deflate/JPEG).
// On failure, inspect the TIFF compression tag and route to the
// appropriate manual tile-fetch fallback:
//   50000 / 50001  → readRastersLerc()
//   50003          → readRastersZstd()
// Other compression failures are re-thrown as fatal errors.
async function readRastersWithFallback(tiff, image, opts) {
  const compression = image.fileDirectory && image.fileDirectory.Compression;

  // Compression 50000/50001 — probe first tile to detect actual format.
  // NZ imagery frequently lies: tag says LERC but tiles are WEBP or ZSTD.
  if (compression === 50000 || compression === 50001) {
    try {
      const fd = image.fileDirectory;
      const offsets    = Array.from(fd.TileOffsets  || fd.StripOffsets  || []);
      const byteCounts = Array.from(fd.TileByteCounts || fd.StripByteCounts || []);
      let firstOff = 0, firstBc = 0;
      for (let i = 0; i < offsets.length; i++) { if (byteCounts[i] > 0) { firstOff = offsets[i]; firstBc = byteCounts[i]; break; } }
      if (firstBc > 0) {
        const probe  = await fetch(tiff._sourceUrl, { headers: { Range: 'bytes=' + firstOff + '-' + (firstOff + 3) } });
        const hdr    = new Uint8Array(await probe.arrayBuffer());
        const isWebp = hdr[0] === 0x52 && hdr[1] === 0x49 && hdr[2] === 0x46 && hdr[3] === 0x46;
        const isZstd = hdr[0] === 0x28 && hdr[1] === 0xB5 && hdr[2] === 0x2F && hdr[3] === 0xFD;
        if (isWebp) {
          debugInfo('Comp 50000 — tiles are WEBP, using standard decoder');
          return await image.readRasters({ ...opts });
        }
        if (isZstd) {
          debugInfo('Comp 50000 — tiles are ZSTD, using ZSTD decoder');
          const { pool: _p, ...safeOpts } = opts;
          return await readRastersZstd(tiff, image, safeOpts);
        }
      }
    } catch(probeErr) { /* probe failed, fall through to LERC */ }
    debugInfo('LERC compression (' + compression + ') — using LERC decoder');
    const { pool: _p, ...safeOpts } = opts;
    return await readRastersLerc(tiff, image, safeOpts);
  }

  // Explicit ZSTD tag
  if (compression === 50003) {
    debugInfo('ZSTD compression — using ZSTD decoder');
    const { pool: _p, ...safeOpts } = opts;
    return await readRastersZstd(tiff, image, safeOpts);
  }

  // WEBP/LZW/Deflate/JPEG — try single-thread first (reliable), Pool as fallback.
  try {
    return await image.readRasters({ ...opts });
  } catch (err) {
    try {
      return await image.readRasters({ ...opts, pool: cogPool });
    } catch (err2) {
      debugErr('readRasters failed: ' + err2.message.slice(0, 80));
      throw err2;
    }
  }
}

// ZSTD tile fallback — for near-infrared imagery (COMPRESSION=ZSTD, PREDICTOR=2).
async function readRastersZstd(tiff, image, opts) {
  const zstd = await window._zstdReady;
  const fd   = image.fileDirectory;
  const imgW = fd.ImageWidth, imgH = fd.ImageLength;
  const tw   = fd.TileWidth  || imgW, th = fd.TileLength || imgH;
  const nTX  = Math.ceil(imgW / tw),  nTY = Math.ceil(imgH / th);
  const predictor      = fd.Predictor || 1;
  const samplesPerPixel = fd.SamplesPerPixel || fd.samplesPerPixel || 1;
  // BitsPerSample may be a real array, an array-like object {0:8,1:8,...}, or a scalar
  const bpsRaw = fd.BitsPerSample || fd.bitsPerSample || 8;
  const bitsPerSample = typeof bpsRaw === 'object'
    ? (Array.isArray(bpsRaw) ? bpsRaw[0] : Object.values(bpsRaw)[0])
    : bpsRaw;
  const bytesPerSample = Math.max(1, Math.floor(bitsPerSample / 8));
  const offsets    = Array.from(fd.TileOffsets  || fd.StripOffsets);
  const byteCounts = Array.from(fd.TileByteCounts || fd.StripByteCounts);
  const [winX0, winY0, winX1, winY1] = opts.window || [0, 0, imgW, imgH];
  const outW = opts.width  || (winX1 - winX0);
  const outH = opts.height || (winY1 - winY0);
  const winW = winX1 - winX0, winH = winY1 - winY0;
  const txMin = Math.floor(winX0 / tw), txMax = Math.min(nTX - 1, Math.floor((winX1 - 1) / tw));
  const tyMin = Math.floor(winY0 / th), tyMax = Math.min(nTY - 1, Math.floor((winY1 - 1) / th));
  const nBands = samplesPerPixel;
  // Use correct typed array for the bit depth
  const BandArray = bytesPerSample === 1 ? Uint8Array : bytesPerSample === 2 ? Uint16Array : Float32Array;
  const bands  = Array.from({ length: nBands }, () => new BandArray(winW * winH));
  const sourceUrl = tiff._sourceUrl;

  for (let ty = tyMin; ty <= tyMax; ty++) {
    for (let tx = txMin; tx <= txMax; tx++) {
      const tIdx = ty * nTX + tx;
      const off = offsets[tIdx], bc = byteCounts[tIdx];
      if (!bc) continue;
      const resp = await fetch(sourceUrl, { headers: { Range: 'bytes=' + off + '-' + (off + bc - 1) } });
      if (!resp.ok) throw new Error('ZSTD tile fetch HTTP ' + resp.status);
      const raw = zstd.decompress(new Uint8Array(await resp.arrayBuffer()));

      // Undo PREDICTOR=2 horizontal differencing.
      // INTERLEAVE=PIXEL: samples stored as (B0,B1..Bn, B0,B1..Bn per pixel)
      // Delta is per-band across pixels, so step = nBands * bytesPerSample.
      if (predictor === 2) {
        const step     = nBands * bytesPerSample;
        const rowBytes = tw * step;
        for (let row = 0; row < th; row++) {
          const base = row * rowBytes;
          for (let col = step; col < rowBytes; col++)
            raw[base + col] = (raw[base + col] + raw[base + col - step]) & 0xFF;
        }
      }

      const tOX = tx * tw, tOY = ty * th;
      const ox0 = Math.max(tOX, winX0), oy0 = Math.max(tOY, winY0);
      const ox1 = Math.min(tOX + tw, winX1), oy1 = Math.min(tOY + th, winY1);
      for (let b = 0; b < nBands; b++) {
        const dst = bands[b];
        for (let y = oy0; y < oy1; y++) {
          for (let x = ox0; x < ox1; x++) {
            // Interleaved: pixel index * nBands + band = sample index
            // byte offset = sample index * bytesPerSample
            const si      = ((y - tOY) * tw + (x - tOX)) * nBands + b;
            const byteOff = si * bytesPerSample;
            dst[(y - winY0) * winW + (x - winX0)] = bytesPerSample === 1
              ? raw[byteOff]
              : bytesPerSample === 2
                ? (raw[byteOff] | (raw[byteOff + 1] << 8))
                : new DataView(raw.buffer).getFloat32(byteOff, true);
          }
        }
      }
    }
  }

  const result = [];
  for (let b = 0; b < nBands; b++) {
    if (outW === winW && outH === winH) { result.push(bands[b]); } else {
      const out = new BandArray(outW * outH);
      const sx = winW / outW, sy = winH / outH;
      for (let y = 0; y < outH; y++)
        for (let x = 0; x < outW; x++)
          out[y * outW + x] = bands[b][Math.round(y * sy) * winW + Math.round(x * sx)];
      result.push(out);
    }
  }
  result.width = outW; result.height = outH;
  return result;
}

// LERC tile fallback — for any genuine LERC tiles.
// Fetches raw tiles via HTTP Range, detects actual tile format from magic bytes,
// decodes WEBP tiles via ImageBitmap or pure LERC via LercDecode.js.
async function readRastersLerc(tiff, image, opts) {
  const lerc = await window._lercReady;
  const fd   = image.fileDirectory;
  const imgW = fd.ImageWidth, imgH = fd.ImageLength;
  const tw   = fd.TileWidth  || imgW, th = fd.TileLength || imgH;
  const nTX  = Math.ceil(imgW / tw),  nTY = Math.ceil(imgH / th);
  const offsets    = Array.from(fd.TileOffsets  || fd.StripOffsets);
  const byteCounts = Array.from(fd.TileByteCounts || fd.StripByteCounts);
  const [winX0, winY0, winX1, winY1] = opts.window || [0, 0, imgW, imgH];
  const outW = opts.width  || (winX1 - winX0);
  const outH = opts.height || (winY1 - winY0);
  const winW = winX1 - winX0, winH = winY1 - winY0;
  const txMin = Math.floor(winX0 / tw), txMax = Math.min(nTX - 1, Math.floor((winX1 - 1) / tw));
  const tyMin = Math.floor(winY0 / th), tyMax = Math.min(nTY - 1, Math.floor((winY1 - 1) / th));
  const sourceUrl = tiff._sourceUrl;
  if (!sourceUrl) throw new Error('LERC: tiff._sourceUrl not set');

  let nBands = 0;
  const tileData = [];

  for (let ty = tyMin; ty <= tyMax; ty++) {
    for (let tx = txMin; tx <= txMax; tx++) {
      const tIdx = ty * nTX + tx;
      const off = offsets[tIdx], bc = byteCounts[tIdx];
      if (!bc) continue;
      const resp = await fetch(sourceUrl, { headers: { Range: 'bytes=' + off + '-' + (off + bc - 1) } });
      if (!resp.ok) throw new Error('LERC tile fetch HTTP ' + resp.status);
      const ab    = await resp.arrayBuffer();
      const bytes = new Uint8Array(ab);
      const isWebp = bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46;

      let decoded;
      if (isWebp) {
        const bitmap = await createImageBitmap(new Blob([bytes], { type: 'image/webp' }));
        const c = document.createElement('canvas');
        c.width = bitmap.width; c.height = bitmap.height;
        c.getContext('2d').drawImage(bitmap, 0, 0);
        const d = c.getContext('2d').getImageData(0, 0, bitmap.width, bitmap.height);
        const n = bitmap.width * bitmap.height;
        const r = new Uint8Array(n), g = new Uint8Array(n), bch = new Uint8Array(n);
        for (let i = 0; i < n; i++) { r[i] = d.data[i*4]; g[i] = d.data[i*4+1]; bch[i] = d.data[i*4+2]; }
        decoded = { pixels: [r, g, bch], width: bitmap.width, height: bitmap.height, bandCount: 3 };
      } else {
        try { decoded = lerc.decode(ab); } catch { decoded = lerc.decode(bytes); }
      }

      if (!nBands) nBands = decoded.bandCount || decoded.pixels?.length || 1;
      tileData.push({ tx, ty, decoded });
    }
  }

  if (!nBands) throw new Error('LERC: no tiles decoded');
  const bands = Array.from({ length: nBands }, () => new Float32Array(winW * winH));
  for (const { tx, ty, decoded } of tileData) {
    const px = decoded.pixels, tW = decoded.width || tw, tH = decoded.height || th;
    const tOX = tx * tw, tOY = ty * th;
    const ox0 = Math.max(tOX, winX0), oy0 = Math.max(tOY, winY0);
    const ox1 = Math.min(tOX + tW, winX1), oy1 = Math.min(tOY + tH, winY1);
    for (let b = 0; b < nBands; b++) {
      const src = px[b] || px, dst = bands[b];
      for (let y = oy0; y < oy1; y++)
        for (let x = ox0; x < ox1; x++)
          dst[(y - winY0) * winW + (x - winX0)] = src[(y - tOY) * tW + (x - tOX)];
    }
  }

  const result = [];
  for (let b = 0; b < nBands; b++) {
    if (outW === winW && outH === winH) { result.push(bands[b]); } else {
      const out = new Float32Array(outW * outH);
      const sx = winW / outW, sy = winH / outH;
      for (let y = 0; y < outH; y++)
        for (let x = 0; x < outW; x++)
          out[y * outW + x] = bands[b][Math.round(y * sy) * winW + Math.round(x * sx)];
      result.push(out);
    }
  }
  result.width = outW; result.height = outH;
  return result;
}

// Render a single COG at the current map viewport.
//
// 1. Computes the intersection of the viewport and the COG bounding box
//    (both in NZTM2000), skipping if there is no overlap.
// 2. Determines the optimal read size — the lesser of screen pixels and
//    native COG pixels for the visible area, to avoid over-fetching.
// 3. Calls readRastersWithFallback() to fetch + decode tile data.
// 4. Converts raster bands to RGBA via toRGBA() and draws to a canvas.
// 5. Adds or updates a MapLibre 'image' source with the canvas data URL,
//    positioned using the four corner coordinates of the visible window.
//
// The token mechanism detects stale renders: if the map moves while a
// render is in flight, token !== cog.token and the result is discarded.
//
// Status transitions:
//   rendering → done   (first successful render)
//   rendering → error  (on exception)
//   done → rendering   (re-render triggered by map move)
async function renderOneCog(cog) {
  if (!cog) return;
  // Skip if image not loaded yet (e.g. after basemap swap)
  if (!cog.image || !cog.tiff) return;
  // Skip if a render is already in flight
  if (cog._rendering) { cog._dirty = true; return; }
  cog._rendering = true;
  const token = ++cog.token;
  if (cog.status === 'done') { cog.status = 'rendering'; _updateCogBar(); }

  try {
    const vp  = map.getBounds();
    const vpW = map.getCanvas().width;
    const vpH = map.getCanvas().height;
    const [vpMinE, vpMinN] = toNZTM(vp.getWest(), vp.getSouth());
    const [vpMaxE, vpMaxN] = toNZTM(vp.getEast(), vp.getNorth());

    const intMinE = Math.max(vpMinE, cog.minE), intMinN = Math.max(vpMinN, cog.minN);
    const intMaxE = Math.min(vpMaxE, cog.maxE), intMaxN = Math.min(vpMaxN, cog.maxN);
    if (intMinE >= intMaxE || intMinN >= intMaxN) return;

    const cogSpanE = cog.maxE - cog.minE, cogSpanN = cog.maxN - cog.minN;
    const screenW = Math.round(vpW * (intMaxE - intMinE) / (vpMaxE - vpMinE));
    const screenH = Math.round(vpH * (intMaxN - intMinN) / (vpMaxN - vpMinN));

    // ── Overview selection ────────────────────────────────────────────────────
    // Pick the overview level whose native resolution is closest to screen res.
    // Cache the overview list on first use to avoid re-fetching headers every render.
    let image = cog.image;
    const fullW = cog.image.getWidth();
    const targetW = Math.round(fullW * (intMaxE - intMinE) / cogSpanE);

    if (cog.tiff._imageCount > 1 && screenW < targetW) {
      // Build overview cache on first render
      if (!cog._overviews) {
        cog._overviews = [{ idx: 0, w: fullW, img: cog.image }];
        for (let i = 1; i < cog.tiff._imageCount; i++) {
          try {
            const ovr = await cog.tiff.getImage(i);
            cog._overviews.push({ idx: i, w: ovr.getWidth(), img: ovr });
          } catch { break; }
        }
      }
      // Pick smallest overview still >= screenW
      let best = cog._overviews[0];
      for (const ovr of cog._overviews) {
        const ovrVisible = Math.round(ovr.w * (intMaxE - intMinE) / cogSpanE);
        if (ovrVisible >= screenW && ovr.w < best.w) best = ovr;
      }
      if (best.idx > 0) {
        image = best.img;
        debugInfo('Overview: level ' + best.idx + ' (' + best.w + 'px)');
      }
    }

    const cogW = image.getWidth(), cogH = image.getHeight();

    const cogPixW = Math.round(cogW * (intMaxE - intMinE) / cogSpanE);
    const cogPixH = Math.round(cogH * (intMaxN - intMinN) / cogSpanN);
    const readW = Math.max(1, Math.min(screenW, cogPixW));
    const readH = Math.max(1, Math.min(screenH, cogPixH));

    const winMinX = Math.max(0,    Math.floor((intMinE - cog.minE) / cogSpanE * cogW));
    const winMaxX = Math.min(cogW, Math.ceil( (intMaxE - cog.minE) / cogSpanE * cogW));
    const winMinY = Math.max(0,    Math.floor((cog.maxN - intMaxN) / cogSpanN * cogH));
    const winMaxY = Math.min(cogH, Math.ceil( (cog.maxN - intMinN) / cogSpanN * cogH));

    const data = await readRastersWithFallback(cog.tiff, image, {
      window: [winMinX, winMinY, winMaxX, winMaxY],
      width: readW, height: readH,
    });
    if (token !== cog.token) return;

    const nirMode = /near.?infrared/i.test(cog.label || '');
    const rgba = toRGBA(data, readW, readH, nirMode);
    const canvas = document.createElement('canvas');
    canvas.width = readW; canvas.height = readH;
    canvas.getContext('2d').putImageData(new ImageData(rgba, readW, readH), 0, 0);

    // Use Blob URL instead of dataURL — much faster to encode and smaller memory footprint
    const blob    = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.85));
    const blobUrl = URL.createObjectURL(blob);
    if (token !== cog.token) { URL.revokeObjectURL(blobUrl); return; }

    // Revoke previous blob URL to free memory
    if (cog._blobUrl) URL.revokeObjectURL(cog._blobUrl);
    cog._blobUrl = blobUrl;

    const [intSwLng, intSwLat] = toWGS84(intMinE, intMinN);
    const [intNwLng, intNwLat] = toWGS84(intMinE, intMaxN);
    const [intNeLng, intNeLat] = toWGS84(intMaxE, intMaxN);
    const [intSeLng, intSeLat] = toWGS84(intMaxE, intMinN);
    if (token !== cog.token) return;

    const coords = [[intNwLng,intNwLat],[intNeLng,intNeLat],[intSeLng,intSeLat],[intSwLng,intSwLat]];
    const src = map.getSource(cog.sourceId);
    if (src) {
      src.updateImage({ url: blobUrl, coordinates: coords });
    } else {
      map.addSource(cog.sourceId, { type: 'image', url: blobUrl, coordinates: coords });
      map.addLayer({ id: cog.layerId, type: 'raster', source: cog.sourceId,
        paint: { 'raster-opacity': cog.opacity !== undefined ? cog.opacity : 0.9, 'raster-fade-duration': 150 } });
      map.on('contextmenu', cog.layerId, window._onCogContextMenu);
    }
    // Mark done on first successful render only
    if (cog.status !== 'done') { cog.status = 'done'; _updateCogBar(); }
  } catch (err) {
    console.error('COG render error:', err);
    if (cog.status !== 'done') { cog.status = 'error'; _updateCogBar(); }
  } finally {
    cog._rendering = false;
    // If the map moved while we were rendering, schedule one more render
    // using setTimeout to break the call stack entirely.
    if (cog._dirty) {
      cog._dirty = false;
      setTimeout(() => renderOneCog(cog), 0);
    }
  }
}

// Re-render all active COGs. Debounced 150ms after last moveend to avoid
// thrashing during continuous pan/zoom — saves unnecessary fetches.
let _renderAllTimer = null;
function renderAllCogs() {
  clearTimeout(_renderAllTimer);
  _renderAllTimer = setTimeout(() => {
    _cogMap.forEach(entry => renderOneCog(entry));
  }, 150);
}

map.on('moveend', renderAllCogs);

// ═══════════════════════════════════════════════════════════════════
// RESULTS PANEL — DELEGATED EVENT HANDLER
// One listener on the results container handles all card interactions.
// Set up once at page load — not inside appendCard — so it is never
// lost when resultsEl.innerHTML is cleared between queries.
// ═══════════════════════════════════════════════════════════════════
resultsEl.addEventListener('click', e => {
  // ── COG "Open on Map" button ─────────────────────────────────────
  const cogBtn = e.target.closest('[data-cog-url]');
  if (cogBtn) {
    e.stopPropagation();
    loadCogOnMap(
      cogBtn.dataset.cogUrl,
      cogBtn.dataset.cogLabel,
      cogBtn.dataset.cogAssetId,
      cogBtn.dataset.cogTitleUnicode
    );
    return;
  }

  // ── Card header expand / collapse ────────────────────────────────
  const header = e.target.closest('.card-header');
  if (header) {
    const card = header.closest('.result-card');
    if (!card) return;
    const wasOpen = card.classList.contains('expanded');
    resultsEl.querySelectorAll('.result-card.expanded')
      .forEach(c => c.classList.remove('expanded'));
    if (!wasOpen) {
      card.classList.add('expanded');
      if (card._feature) showFootprint(card._feature, true);
    }
  }


});

// ── COG right-click context menu ──────────────────────────────────
const _ctxMenu   = document.getElementById('cog-context-menu');
const _ctxName   = document.getElementById('ctx-layer-name');
const _ctxDlLink = document.getElementById('ctx-download-link');

// Show the right-click context menu for a COG overlay.
// Positions the menu near the cursor, nudging inward to stay on screen.
// The download action uses blobDownload() to force the correct filename.
function _showCogContextMenu(cogEntry, clientX, clientY) {
  _ctxName.textContent = cogEntry.label;
  _ctxDlLink.href      = '#';
  _ctxDlLink.onclick   = e => { e.preventDefault(); blobDownload(cogEntry.url, _cogDownloadName(cogEntry)); };
  // Position near cursor, nudge inward if it would overflow
  _ctxMenu.style.left = '0px'; _ctxMenu.style.top = '0px';
  _ctxMenu.classList.add('visible');
  const mw = _ctxMenu.offsetWidth, mh = _ctxMenu.offsetHeight;
  _ctxMenu.style.left = (clientX + mw > window.innerWidth  ? clientX - mw : clientX) + 'px';
  _ctxMenu.style.top  = (clientY + mh > window.innerHeight ? clientY - mh : clientY) + 'px';
}

function _dismissCtxMenu() { _ctxMenu.classList.remove('visible'); }

// MapLibre layer-level contextmenu handler.
// Registered via map.on('contextmenu', layerId, ...) when the layer is
// first created in renderOneCog(). Resolves the clicked layer back to
// its _cogMap entry and delegates to _showCogContextMenu().
window._onCogContextMenu = function(e) {
  const layerId = e.features && e.features[0] && e.features[0].layer && e.features[0].layer.id;
  const cogEntry = [..._cogMap.values()].find(v => v.layerId === layerId);
  if (!cogEntry) return;
  e.originalEvent.preventDefault();
  _showCogContextMenu(cogEntry, e.originalEvent.clientX, e.originalEvent.clientY);
};

// Canvas-level contextmenu fallback.
// MapLibre does not always bubble contextmenu events through image sources.
// This handler fires on the raw canvas element and does a bounding-box
// hit test against all active COG entries to find the right one.
map.getCanvas().addEventListener('contextmenu', e => {
  if (_ctxMenu.classList.contains('visible')) return; // already handled by layer event
  // Find which COG (if any) contains this point
  const pt = map.unproject([e.clientX - map.getCanvas().getBoundingClientRect().left,
                             e.clientY - map.getCanvas().getBoundingClientRect().top]);
  const [lng, lat] = [pt.lng, pt.lat];
  const hit = [..._cogMap.values()].find(v => {
    const [minLng, maxLng] = [Math.min(v.swLng,v.nwLng), Math.max(v.neLng,v.seLng)];
    const [minLat, maxLat] = [Math.min(v.swLat,v.seLat), Math.max(v.nwLat,v.neLat)];
    return lng >= minLng && lng <= maxLng && lat >= minLat && lat <= maxLat;
  });
  if (hit) { e.preventDefault(); _showCogContextMenu(hit, e.clientX, e.clientY); }
});

document.addEventListener('click', _dismissCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') _dismissCtxMenu(); });
map.on('movestart', _dismissCtxMenu);
map.on('zoomstart', _dismissCtxMenu);

// ═══════════════════════════════════════════════════════════════════
// GEOCODER  — Nominatim (OSM) place search with debounced autocomplete
//
// Flow:
//   keystroke → 350ms debounce → Nominatim API (NZ-biased) →
//   dropdown results → select → map.flyTo() + optional imagery query
//
// Keyboard: ↑/↓ navigate results, Enter selects, Escape clears.
// No API key required. Requests are throttled by the debounce so
// Nominatim's usage policy (max 1 req/sec) is respected.
// ═══════════════════════════════════════════════════════════════════

(function() {
  const input      = document.getElementById('geocoder-input');
  const resultsEl  = document.getElementById('geocoder-results');
  const clearBtn   = document.getElementById('geocoder-clear');
  const spinner    = document.getElementById('geocoder-spinner');

  let _debounceTimer = null;
  let _activeIdx     = -1;   // keyboard-selected result index
  let _results       = [];   // current Nominatim result set
  let _currentQuery  = '';   // last dispatched query string

  // ── Nominatim fetch ───────────────────────────────────────────────
  // Biased to New Zealand via countrycodes=nz and viewbox around NZ.
  // Results are limited to 6 to keep the dropdown compact.
  async function fetchPlaces(query) {
    const params = new URLSearchParams({
      q:            query,
      format:       'jsonv2',
      countrycodes: 'nz',
      viewbox:      '165,-48,179,-34',  // NZ bounding box (lng1,lat1,lng2,lat2)
      bounded:      '0',                // 0 = fall back outside viewbox if no NZ result
      limit:        '6',
      addressdetails: '1',
    });
    const url = `https://nominatim.openstreetmap.org/search?${params}`;
    const resp = await fetch(url, {
      headers: { 'Accept-Language': 'en', 'User-Agent': 'mutant.kiwi-imagery-explorer' }
    });
    if (!resp.ok) throw new Error('Nominatim HTTP ' + resp.status);
    return resp.json();
  }

  // ── Format a Nominatim result into two display lines ─────────────
  function formatResult(r) {
    // Primary name: use display_name first segment, or name
    const parts  = (r.display_name || '').split(',').map(s => s.trim());
    const name   = parts[0] || r.name || '?';
    // Detail: next 2 meaningful parts (skip duplicates of name)
    const detail = parts.slice(1).filter(p => p && p !== name).slice(0, 2).join(', ');
    return { name, detail };
  }

  // ── Render dropdown ───────────────────────────────────────────────
  function renderResults(items) {
    _results  = items;
    _activeIdx = -1;

    if (!items.length) {
      resultsEl.innerHTML = '<div class="geocoder-no-results">No results found</div>';
      resultsEl.classList.add('visible');
      return;
    }

    resultsEl.innerHTML = items.map((r, i) => {
      const { name, detail } = formatResult(r);
      return `
        <div class="geocoder-item" data-idx="${i}">
          <div class="geocoder-item-name">${escHtml(name)}</div>
          ${detail ? `<div class="geocoder-item-detail">${escHtml(detail)}</div>` : ''}
        </div>`;
    }).join('');

    resultsEl.querySelectorAll('.geocoder-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        // mousedown fires before input blur, so we can still read the index
        e.preventDefault();
        selectResult(parseInt(el.dataset.idx, 10));
      });
    });

    resultsEl.classList.add('visible');
  }

  // ── Select a result: fly map to it ───────────────────────────────
  function selectResult(idx) {
    const r = _results[idx];
    if (!r) return;

    const { name } = formatResult(r);
    input.value = name;
    clearBtn.style.display = 'block';
    hideResults();

    // Use bounding box if available for a better fit, else point + zoom
    if (r.boundingbox) {
      const [s, n, w, e] = r.boundingbox.map(Number);
      map.fitBounds([[w, s], [e, n]], { padding: 80, maxZoom: 16, duration: 900 });
    } else {
      map.flyTo({ center: [parseFloat(r.lon), parseFloat(r.lat)], zoom: 14, duration: 900 });
    }

    debugInfo(`Geocoder → ${name} [${parseFloat(r.lat).toFixed(4)}, ${parseFloat(r.lon).toFixed(4)}]`);
  }

  // ── Debounced search trigger ──────────────────────────────────────
  function scheduleSearch(query) {
    clearTimeout(_debounceTimer);
    if (query.length < 2) { hideResults(); return; }

    _debounceTimer = setTimeout(async () => {
      if (query !== _currentQuery) {
        _currentQuery = query;
        spinner.style.display = 'block';
        try {
          const items = await fetchPlaces(query);
          // Discard stale responses if the input has changed since we fired
          if (query === input.value.trim()) renderResults(items);
        } catch (err) {
          debugErr('Geocoder: ' + err.message);
        } finally {
          spinner.style.display = 'none';
        }
      }
    }, 350); // 350ms debounce — well within Nominatim's 1 req/sec policy
  }

  // ── Keyboard navigation ───────────────────────────────────────────
  function moveActive(dir) {
    const items = resultsEl.querySelectorAll('.geocoder-item');
    if (!items.length) return;
    items[_activeIdx]?.classList.remove('active');
    _activeIdx = Math.max(0, Math.min(items.length - 1, _activeIdx + dir));
    items[_activeIdx]?.classList.add('active');
    items[_activeIdx]?.scrollIntoView({ block: 'nearest' });
  }

  function hideResults() {
    resultsEl.classList.remove('visible');
    resultsEl.innerHTML = '';
    _results   = [];
    _activeIdx = -1;
  }

  // ── Event wiring ──────────────────────────────────────────────────
  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.style.display = q ? 'block' : 'none';
    scheduleSearch(q);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveActive(+1); }
    if (e.key === 'ArrowUp')    { e.preventDefault(); moveActive(-1); }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (_activeIdx >= 0) selectResult(_activeIdx);
      else if (_results.length) selectResult(0);
    }
    if (e.key === 'Escape') {
      hideResults();
      input.blur();
    }
  });

  input.addEventListener('blur', () => {
    // Small delay so mousedown on a result fires first
    setTimeout(hideResults, 150);
  });

  input.addEventListener('focus', () => {
    // Re-show results if there's a previous query still in the box
    if (input.value.trim().length >= 2 && _results.length) {
      resultsEl.classList.add('visible');
    }
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    hideResults();
    input.focus();
  });

})(); // end geocoder IIFE

document.getElementById('cog-overlay-close').onclick = () => removeCogOverlay();

document.getElementById('cog-bar-toggle-all').onclick = () => {
  const allOff = [..._cogMap.values()].every(e => e.visible === false);
  const newVis = allOff; // if all off → turn all on; otherwise turn all off
  for (const entry of _cogMap.values()) {
    entry.visible = newVis;
    const vis = newVis ? 'visible' : 'none';
    if (map.getLayer(entry.layerId)) map.setLayoutProperty(entry.layerId, 'visibility', vis);
  }
  _updateCogBar();
};

// Download all COG sheets that have rendered successfully (green tick).
// Each file is fetched and saved separately via blobDownload(), with a
// short stagger between requests to avoid overwhelming the browser/network.
async function downloadAllCogs() {
  const btn = document.getElementById('cog-bar-dl-all');
  const done = [..._cogMap.values()].filter(e => e.status === 'done');
  if (!done.length) { debugInfo('No rendered sheets to download'); return; }

  btn.disabled = true;
  btn.textContent = '↓ 0/' + done.length;

  for (let i = 0; i < done.length; i++) {
    const entry = done[i];
    btn.textContent = '↓ ' + (i + 1) + '/' + done.length;
    await blobDownload(entry.url, _cogDownloadName(entry));
    // Small gap between downloads so the browser can process each blob URL
    if (i < done.length - 1) await new Promise(r => setTimeout(r, 400));
  }

  btn.disabled = false;
  btn.textContent = '↓ all';
  debugInfo('Batch download complete — ' + done.length + ' file(s)');
}

document.getElementById('cog-bar-dl-all').onclick = downloadAllCogs;
</script>
</body>
</html>
